{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    {{ if .Params.featured_image }}
      <p>{{ partial "responsive-image.html" (dict
        "src" .Params.featured_image
        "alt" .Title
        "sizes" "92vw"
        "widths" (slice 480 768 960 1200)
        "loading" "eager"
      ) }}</p>
    {{ end }}
    {{ .Content }}
  </article>
{{ end }}
