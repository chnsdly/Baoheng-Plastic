{{- $lang := .Site.Language.Lang -}}
{{ with .Params.factory }}
  {{ if .enable }}
    <section class="factory">
      <div class="container factory__inner">
        <div class="home-section-head">
          <p class="home-section-head__eyebrow">{{ if eq $lang "zh" }}工厂能力{{ else }}Factory capability{{ end }}</p>
          <h2 class="home-section-head__title">{{ .title }}</h2>
          {{ with .description }}<p class="factory__description">{{ . }}</p>{{ end }}
        </div>

        <div class="factory__grid">
          {{ range .items }}
            <article class="factory__item">
              <img class="factory__image"
                   src="{{ .image | relURL }}"
                   alt="{{ .title }}"
                   loading="lazy"
                   decoding="async">
              <div class="factory__content">
                <h3 class="factory__item-title">{{ .title }}</h3>
                <p class="factory__item-text">{{ .content }}</p>
              </div>
            </article>
          {{ end }}
        </div>
      </div>
    </section>
  {{ end }}
{{ end }}
