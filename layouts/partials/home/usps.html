{{ with .Params.usps }}
{{ if .enable }}
<section class="section usps">
  <div class="container container--wide">
    {{ with .items }}
    <ul class="usps__list">
      {{ range . }}
      <li class="usps__item">
        <div class="usps__icon" aria-hidden="true">
          {{ with .icon }}<i class="{{ . }}"></i>{{ end }}
        </div>
        <div class="usps__content">
          <p class="font-title-s">{{ .title }}</p>
          <p class="font-body">{{ .description }}</p>
        </div>
      </li>
      {{ end }}
    </ul>
    {{ end }}
  </div>
</section>
{{ end }}
{{ end }}
