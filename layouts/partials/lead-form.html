{{/* layouts/partials/lead-form.html */}}
{{ $type := .type }}
{{ $slug := .slug }}
{{ $page := .page }}
{{ $sitekey := .sitekey }}
{{ $lang := $page.Site.Language.Lang }}

<form action="/api/lead" method="POST" class="lead-form" novalidate>
  <input type="hidden" name="form_type" value="{{ $type }}">
  {{ if eq $type "download" }}
    <input type="hidden" name="download_slug" value="{{ $slug }}">
  {{ end }}
  <input type="hidden" name="page_url" value="{{ $page.Permalink }}">
  <input type="hidden" name="utm_source"   id="utm_source">
  <input type="hidden" name="utm_medium"   id="utm_medium">
  <input type="hidden" name="utm_campaign" id="utm_campaign">
  <input type="hidden" name="utm_term"     id="utm_term">
  <input type="hidden" name="utm_content"  id="utm_content">

  <div style="display:none;"><input name="website" autocomplete="off"></div>

  <label>{{ if eq $lang "zh" }}姓名*{{ else }}Your Name*{{ end }}<input name="name" required autocomplete="name"></label>
  <label>{{ if eq $lang "zh" }}邮箱*{{ else }}Email*{{ end }}<input name="email" type="email" required autocomplete="email"></label>
  <label>{{ if eq $lang "zh" }}公司{{ else }}Company{{ end }}<input name="company" autocomplete="organization"></label>
  <label>{{ if eq $lang "zh" }}国家/地区*{{ else }}Country*{{ end }}<input name="country" required autocomplete="country-name"></label>
  <label>{{ if eq $lang "zh" }}电话/WhatsApp*{{ else }}Phone / WhatsApp*{{ end }}<input name="phone" type="tel" required autocomplete="tel"></label>
  <label class="lead-form__message">{{ if eq $lang "zh" }}需求说明{{ else }}Message{{ end }}<textarea name="message" rows="4" placeholder="{{ if eq $lang "zh" }}请填写产品型号、数量、使用场景、承重或尺寸要求。{{ else }}Tell us the product model, quantity, application, load, or size requirements.{{ end }}"></textarea></label>

  <!-- Turnstile -->
  <div class="cf-turnstile" data-sitekey="{{ $sitekey }}"></div>
  <button type="submit">{{ if eq $lang "zh" }}提交询盘{{ else }}Submit inquiry{{ end }}</button>
</form>

<script defer src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>
<script>
  (function(){
    const p = new URLSearchParams(location.search);
    for (const k of ["utm_source","utm_medium","utm_campaign","utm_term","utm_content"]) {
      const el = document.getElementById(k);
      if (el && p.get(k)) el.value = p.get(k);
    }
  })();
</script>
