{{/* layouts/partials/lead-form.html */}}
{{ $type := .type }}
{{ $slug := .slug }}
{{ $page := .page }}
{{ $sitekey := .sitekey }}

<form action="/api/lead" method="POST" class="lead-form" novalidate>
  <input type="hidden" name="form_type" value="{{ $type }}">
  {{ if eq $type "download" }}
    <input type="hidden" name="download_slug" value="{{ $slug }}">
  {{ end }}
  <input type="hidden" name="page_url" value="{{ $page.Permalink }}">
  <input type="hidden" name="utm_source"   id="utm_source">
  <input type="hidden" name="utm_medium"   id="utm_medium">
  <input type="hidden" name="utm_campaign" id="utm_campaign">
  <input type="hidden" name="utm_term"     id="utm_term">
  <input type="hidden" name="utm_content"  id="utm_content">

  <div style="display:none;"><input name="website" autocomplete="off"></div>

  <label>{{ i18n "contact_form_name_required" }}<input name="name" required autocomplete="name"></label>
  <label>{{ i18n "contact_form_email_required" }}<input name="email" type="email" required autocomplete="email"></label>
  <label>{{ i18n "company" }}<input name="company" autocomplete="organization"></label>
  <label>{{ i18n "country_required" }}<input name="country" required autocomplete="country-name"></label>
  <label>{{ i18n "contact_form_phone_required" }}<input name="phone" type="tel" required autocomplete="tel"></label>
  <label class="lead-form__message">{{ i18n "contact_form_message" }}<textarea name="message" rows="4" placeholder="{{ i18n "contact_form_message_placeholder" }}"></textarea></label>

  <!-- Turnstile -->
  <div class="cf-turnstile" data-sitekey="{{ $sitekey }}"></div>
  <button type="submit">{{ i18n "submit_inquiry" }}</button>
</form>

<script defer src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>
<script>
  (function(){
    const p = new URLSearchParams(location.search);
    for (const k of ["utm_source","utm_medium","utm_campaign","utm_term","utm_content"]) {
      const el = document.getElementById(k);
      if (el && p.get(k)) el.value = p.get(k);
    }
  })();
</script>
