        - "套叠底部有利于返空和出口装柜；除非当前型号数据列明货架工况，否则不应默认用于货架。"
        - "需确认进叉方式、面板接触面积、运输中货物稳定性、装柜数量和目的地搬运设备。"
      form: "请提供载荷、出口路线、装柜目标、搬运设备、堆码高度和是否循环使用。"
    "Spill Containment Pallets":
      hero: "防渗漏托盘用于液体、桶装或风险区域管理，重点是二次围堵、化学兼容性、排液和清洗，而不是普通托盘承重。"
      card: "适合桶装液体或泄漏风险区域，需确认围堵容积和化学兼容性。"
