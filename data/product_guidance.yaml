    "Freezing Trays":
      hero: "冷冻和晾晒托盘应围绕气流、排水、产品接触、堆码高度、清洗方式和低温搬运条件选型。"
      card: "适合冷冻、晾晒或清洗线，重点确认通风、排水和产品接触要求。"
