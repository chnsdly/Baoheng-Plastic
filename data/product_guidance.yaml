es:
  load_note: "Las cargas estática, dinámica y en estantería corresponden a condiciones distintas y no son intercambiables. Para confirmar un modelo hay que revisar la distribución de la carga, el apoyo, la luz de la estantería, la temperatura, el tiempo de almacenamiento, la frecuencia de uso y el margen de seguridad."
  no_racking_note: "Esta página no indica una carga en estantería para este modelo. Considérelo para apilado en suelo, traslados, exportación o retención hasta comprobar su uso en estantería con la luz y el apoyo reales."
  families:
    "Plastic Pallets":
      hero: "El palet de plástico debe elegirse según su estructura, el apoyo, la carga, el equipo de manipulación, la higiene y el entorno de almacenamiento; la carga nominal por sí sola no basta."
      card: "Compruebe la base, las entradas de horquilla, el uso en suelo o estantería y el material."
      details:
        - "Indique si se utilizará con transpaleta, carretilla elevadora, transportador, apilado en suelo, estantería, exportación o un circuito reutilizable."
        - "Confirme si la superficie debe ser abierta o cerrada, si la base tendrá patines o patas y si la carga estará repartida o concentrada."
        - "Para alimentación, cámaras frigoríficas, productos químicos o automatización, indique también la limpieza, la temperatura, los impactos y las tolerancias dimensionales."
      form: "Indique la mercancía, el peso por palet, el patrón de carga, la luz de la estantería si procede, el equipo, la temperatura, la cantidad y el destino."
    "Pallet Boxes & Bulk Containers":
      hero: "Las cajas palet y los contenedores de gran volumen se eligen por su capacidad interior, plegado, apilado, acceso de horquillas, retorno en vacío y tipo de mercancía."
      card: "Compruebe el volumen útil, la base, la altura de apilado, el retorno en vacío y la forma de carga."
      details:
        - "Indique si el contenedor llevará piezas sueltas, productos agrícolas, mercancía embalada, líquidos o cargas irregulares."
        - "En los modelos plegables, compruebe la altura plegada, los cierres, el apilado y la ruta de retorno."
        - "Si se utilizará en estanterías, transportadores, cámaras frigoríficas o zonas de lavado, confirme el apoyo, la temperatura, el drenaje y la limpieza."
      form: "Indique la mercancía, el peso de llenado, la altura de apilado, la ruta de retorno, el equipo y el destino."
    "Plastic Crates & Boxes":
      hero: "Las cajas, bandejas y depósitos de plástico deben ajustarse a las necesidades de ventilación, drenaje, encajado, apilado, manipulación manual, limpieza y protección."
      card: "Adecuados cuando se necesita ventilación, drenaje, manipulación manual o retornos frecuentes."
      details:
        - "Las cajas perforadas favorecen la ventilación y el drenaje; las cajas cerradas y los depósitos contienen mejor piezas pequeñas, líquidos o ingredientes."
        - "Indique si el producto debe encajarse, apilarse o plegarse, ya que cada estructura ocupa un volumen distinto durante el retorno."
        - "Para alimentación, frío, lavado o secado, confirme el material, la limpieza, el drenaje, la temperatura y el contacto con el producto."
      form: "Indique la mercancía, las dimensiones, el peso, el apilado o encajado, la limpieza y la temperatura."
    "Plastic Waste Bins":
      hero: "Los contenedores de residuos de plástico se eligen por su capacidad, ruedas, tapa, exposición exterior, frecuencia de recogida y recorrido de transporte."
      card: "Compruebe la capacidad, las ruedas, la tapa, la frecuencia de recogida y el lugar de uso."
      details:
        - "Los recipientes pequeños se utilizan normalmente en interiores; los modelos con ruedas son más adecuados para rutas de recogida y zonas exteriores."
        - "Compruebe las ruedas, el eje, el asa, la tapa y las paredes según el suelo, la distancia, los impactos y la frecuencia de uso."
        - "Para compras por proyecto, confirme el color, el etiquetado, los repuestos, el embalaje y la compatibilidad con el equipo local."
      form: "Indique la capacidad, el color, la tapa, las ruedas, la cantidad, el lugar de uso y el método de recogida."
fr:
  load_note: "Les charges statique, dynamique et sur rayonnage correspondent à des conditions différentes et ne sont pas interchangeables. Le choix final doit tenir compte de la répartition de la charge, des appuis, de la portée du rayonnage, de la température, de la durée de stockage, de la fréquence de manutention et de la marge de sécurité."
  no_racking_note: "Aucune charge sur rayonnage n'est indiquée pour ce modèle. Il doit être considéré pour le gerbage au sol, le transfert, l'exportation ou la rétention tant que son utilisation sur rayonnage n'a pas été vérifiée avec la portée et les appuis réels."
  families:
    "Plastic Pallets":
      hero: "Une palette en plastique se choisit selon sa structure, ses appuis, la charge, les équipements de manutention, les exigences d'hygiène et l'environnement de stockage ; la charge nominale ne suffit pas."
      card: "Vérifiez la base, les entrées de fourches, l'utilisation au sol ou sur rayonnage et la matière."
      details:
        - "Indiquez si la palette sera utilisée avec un transpalette, un chariot élévateur, un convoyeur, au sol, sur rayonnage, à l'exportation ou dans un circuit réutilisable."
        - "Précisez si le plateau doit être ajouré ou fermé, si la base comporte des semelles ou des pieds et si la charge est répartie ou concentrée."
        - "Pour l'agroalimentaire, le froid, les produits chimiques ou l'automatisation, précisez également le nettoyage, la température, les chocs et les tolérances dimensionnelles."
      form: "Indiquez la marchandise, le poids par palette, le plan de chargement, la portée du rayonnage le cas échéant, les équipements, la température, la quantité et la destination."
    "Pallet Boxes & Bulk Containers":
      hero: "Les caisses-palettes et grands conteneurs se choisissent selon leur volume utile, leur pliage, leur gerbage, l'accès des fourches, le retour à vide et la nature des marchandises."
      card: "Vérifiez le volume utile, la base, la hauteur de gerbage, le retour à vide et le mode de chargement."
      details:
        - "Indiquez si le conteneur recevra des pièces en vrac, des produits agricoles, des marchandises emballées, des liquides ou des charges irrégulières."
        - "Pour un modèle pliable, vérifiez la hauteur repliée, les verrouillages, le gerbage et le trajet de retour."
        - "Pour une utilisation sur rayonnage, convoyeur, en chambre froide ou en zone de lavage, confirmez les appuis, la température, le drainage et le nettoyage."
      form: "Indiquez la marchandise, le poids de remplissage, la hauteur de gerbage, le trajet de retour, les équipements et la destination."
    "Plastic Crates & Boxes":
      hero: "Les caisses, bacs, plateaux et cuves en plastique doivent répondre aux besoins de ventilation, de drainage, d'emboîtement, de gerbage, de manutention manuelle, de nettoyage et de protection."
      card: "Adaptés lorsque la ventilation, le drainage, la manutention manuelle ou les retours fréquents sont importants."
      details:
        - "Les caisses ajourées favorisent la ventilation et le drainage ; les bacs fermés et les cuves retiennent mieux les petites pièces, les liquides ou les ingrédients."
        - "Précisez si le produit doit être emboîtable, gerbable ou pliable, car chaque structure occupe un volume différent au retour."
        - "Pour l'alimentaire, le froid, le lavage ou le séchage, confirmez la matière, le nettoyage, le drainage, la température et le contact avec le produit."
      form: "Indiquez la marchandise, les dimensions, le poids, le gerbage ou l'emboîtement, le nettoyage et la température."
    "Plastic Waste Bins":
      hero: "Les poubelles en plastique se choisissent selon leur capacité, leurs roues, leur couvercle, l'exposition extérieure, la fréquence de collecte et le trajet de déplacement."
      card: "Vérifiez la capacité, les roues, le couvercle, la fréquence de collecte et le lieu d'utilisation."
      details:
        - "Les petits récipients sont généralement destinés aux espaces intérieurs ; les modèles roulants conviennent mieux aux tournées de collecte et aux zones extérieures."
        - "Vérifiez les roues, l'axe, la poignée, le couvercle et les parois selon le sol, la distance, les chocs et la fréquence d'utilisation."
        - "Pour un achat sur projet, confirmez la couleur, le marquage, les pièces de rechange, l'emballage et la compatibilité avec les équipements locaux."
