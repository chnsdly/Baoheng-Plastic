en:
  load_note: "Treat static, dynamic, and racking loads as reference conditions, not interchangeable ratings. Final selection should confirm load distribution, support method, rack span, temperature, storage duration, handling frequency, and safety margin."
  no_racking_note: "No racking load is published for this model on this page. Treat it as a floor-stacking, transfer, export, or containment option until rack use is confirmed against the exact beam span, support method, and load."
  families:
    "Plastic Pallets":
      hero: "Plastic pallets should be selected by structure, support method, load type, handling equipment, hygiene needs, and storage environment rather than by nominal load alone."
      card: "Review structure, entry type, load condition, rack or floor use, and material before shortlisting this pallet."
      details:
        - "The handling method determines the required base. Tell us whether the pallet will use a hand pallet truck, forklift, conveyor, floor stacking, beam racking, export shipping, or a closed return loop."
        - "Confirm whether the deck is open or closed, how the runners or feet support the load, and whether the goods are evenly distributed or concentrated at a few points."
        - "For hygiene, cold-room, chemical, or automated use, confirm cleaning method, temperature range, impact risk, and dimensional tolerance before approving a bulk order."
      form: "Share goods, unit load weight, palletizing pattern, rack span if any, handling equipment, temperature, quantity, and destination so the model can be checked against real use."
    "Pallet Boxes & Bulk Containers":
      hero: "Pallet boxes and bulk containers are selected around internal volume, foldability, stacking method, forklift access, return logistics, and the type of goods being handled."
      card: "Check volume, base structure, stack height, return ratio, and loading method before specifying this container."
      details:
        - "Confirm whether the container will carry loose parts, produce, packaged goods, liquids, or irregular loads because side-wall stiffness and base support requirements differ."
        - "For foldable designs, review folded height, latch condition, stacking behavior, and the return route to determine whether space savings justify the model."
        - "If the container enters racks, conveyors, cold rooms, or wash areas, confirm support span, temperature, drainage, cleaning method, and handling frequency."
      form: "Share product type, fill weight, stacking height, return route, loading equipment, and destination so the container can be checked for fit."
    "Plastic Crates & Boxes":
      hero: "Plastic crates, boxes, trays, and tanks should be matched to ventilation, drainage, nesting or stacking behavior, manual handling, cleaning, and product protection needs."
      card: "Suitable when the product needs ventilation, drainage, manual handling, or repeated return."
      details:
        - "Open mesh crates help ventilation and drainage; closed boxes and tanks better contain small goods, liquids, ingredients, or items that need more protection."
        - "Check whether the operation needs nesting, stack-nesting, folding, or stable full-load stacking because each structure changes storage density and handling behavior."
        - "For food, cold-chain, washing, or drying use, confirm material grade, cleaning process, drainage time, temperature exposure, and contact-surface requirements."
      form: "Share goods, dimensions, fill weight, stacking or nesting needs, cleaning method, and operating temperature so the right crate or container type can be reviewed."
    "Plastic Waste Bins":
      hero: "Plastic waste bins should be selected by capacity, wheel arrangement, lid type, outdoor exposure, collection frequency, and compatibility with the local handling route."
      card: "Confirm capacity, wheel type, lid, collection frequency, and outdoor exposure before choosing a bin."
      details:
        - "Small bins are usually selected for indoor, office, facility, or low-volume sorting points; larger wheeled bins suit collection routes and outdoor staging areas."
        - "Review wheel size, axle support, lid fit, handle position, and wall thickness against the expected surface, collection frequency, and impact risk."
        - "For municipal or project purchasing, confirm color coding, labeling, packing quantity, spare parts, and local collection equipment compatibility before ordering."
      form: "Share capacity, color, lid, wheel, quantity, use location, and collection method so the bin specification can be checked."
  series:
    "Rackable 3-Runner Pallets":
      hero: "A three-runner pallet suits beam-rack storage, forklift handling, and repeated warehouse use when rack span and deflection are confirmed."
      card: "Best reviewed for beam-rack lanes, forklift movement, and warehouse reuse where runner support and rack span must be confirmed."
      details:
        - "The three-runner base is commonly used where pallets need defined runner support for forklifts and selective racking, but actual rack use depends on beam span, load distribution, and dwell time."
        - "Open-deck versions can reduce weight and improve drainage, while steel reinforcement options should be evaluated when racking exposure, heavy cartons, or long storage duration increase deflection risk."
        - "Confirm entry direction, pallet jack access, conveyor contact points if used, cold-room exposure, and whether the rack load is based on evenly distributed goods."
      form: "Share unit load weight, palletizing pattern, beam span, rack type, storage duration, temperature, and handling equipment for suitability review."
    "Perimeter-Base Stackable Pallets":
      hero: "A perimeter-base pallet is typically considered for stable floor stacking and repeated forklift handling when a continuous base is more important than nesting efficiency."
      card: "Review this pallet for floor stacking, forklift transfer, and reusable circulation where base stability matters."
      details:
        - "The perimeter base gives broad contact with the floor or the pallet below, which can improve stack stability for cartons, bags, or boxed industrial goods."
        - "Do not assume rack suitability from the base shape alone. If no racking load is listed, confirm beam support, reinforcement, and deflection before any rack application."
        - "Check fork entry, load overhang, deck flatness, stacking height, cleaning needs, and whether the pallet must run through conveyors or automated transfer points."
      form: "Share load weight, load footprint, stacking height, forklift type, storage method, and whether rack use is required."
    "Double-Faced Heavy-Duty Pallets":
      hero: "A double-faced pallet is usually reviewed for heavy floor stacking, block stacking, and repeated forklift circulation where both faces need to support the load."
      card: "Use for heavy floor stacking or reversible handling after confirming load distribution and equipment fit."
      details:
        - "The reversible deck can support stacked loads from either side, but it is usually not suitable for hand pallet trucks because there is no open bottom deck clearance."
        - "Heavy-duty use should be verified against concentrated loads, forklift impact, stacking height, storage duration, and whether goods have sharp feet or uneven bases."
        - "If rack use is expected, request current model data for beam span, reinforcement, and deflection limits rather than relying on static or dynamic load values."
      form: "Share load type, base contact area, stacking height, forklift type, rack requirement if any, and operating temperature."
    "Nestable 9-Leg Pallets":
      hero: "A nestable 9-leg pallet is generally used for export shipping, empty-return savings, and floor transfer where rack support is not required."
      card: "Suitable for export, one-way shipping, and compact empty storage when the pallet will not be used in racks."
      details:
        - "The 9-leg base lets empty pallets nest together, reducing storage and return volume, but it normally provides less rack support than runner-base pallets."
        - "Use this structure for floor stacking, light-to-medium transfer, export loads, or distribution lanes where the pallet is supported by the floor or a full platform."
        - "Confirm pallet jack use, fork entry, load overhang, nest height, container loading quantity, and whether destination handling will require racking."
      form: "Share destination, container loading target, unit load weight, goods footprint, handling equipment, and whether the pallet is one-way or reusable."
    "Nestable Blow-Molded Pallets":
      hero: "A blow-molded nestable pallet is typically considered for export, floor handling, and impact-prone transfer routes where empty nesting and moisture resistance are useful."
      card: "Review for export or floor handling when nesting, impact behavior, and moisture resistance matter more than rack support."
      details:
        - "Blow-molded pallets often use hollow molded sections that can absorb handling impact differently from injection-molded grid pallets, but final performance still depends on load and support."
        - "The nestable base supports empty-return savings and export packing, while rack use should not be assumed unless current model data lists a racking condition."
        - "Confirm fork entry, deck contact area, load stability during transport, container loading quantity, and destination handling equipment."
      form: "Share load weight, export route, container target, handling equipment, stack height, and whether pallets will be reused."
    "Spill Containment Pallets":
      hero: "Spill containment pallets are selected for liquid or drum handling where secondary containment, chemical compatibility, drainage, and cleaning access are more important than general pallet load ratings."
      card: "Use for drums, liquid containers, or risk zones after confirming containment volume and chemical compatibility."
      details:
        - "Confirm the container type, liquid volume, number of drums, and spill-risk zone. The sump capacity and grate support must match the actual use."
        - "Material compatibility should be checked against the liquid or chemical family, cleaning chemicals, outdoor exposure, and whether the pallet will sit in a bunded area."
        - "Do not treat spill pallets as rackable or transport pallets unless the exact model data confirms that use; many are designed mainly for floor staging and containment."
      form: "Share chemical or liquid type, container size, number of drums, required containment volume, indoor or outdoor use, and handling method."
    "Printing Pallets":
      hero: "Printing pallets should be evaluated for flatness, dimensional consistency, clean surfaces, and equipment fit rather than only by general pallet load data."
      card: "Review this pallet for print, paper, or packaging lines where flatness and machine fit are critical."
      details:
        - "Confirm the printing press or converting-line interface, required flatness, board or sheet size, and whether the pallet feeds directly into equipment."
        - "Surface texture, edge condition, dimensional tolerance, and cleanliness can affect paper handling, sheet alignment, and operator safety."
        - "Load ratings should be checked together with stack height, paper weight, moisture conditions, and whether the pallet is stored, moved, or fed by automation."
      form: "Share equipment model, sheet or board size, stack height, load weight, handling method, and cleanliness requirements."
    "Food & Pharmaceutical Pallets":
      hero: "Hygienic plastic pallets should be selected by cleanability, closed or smooth surfaces, contamination control, color coding, and the facility's own food or pharmaceutical handling rules."
      card: "Review for hygiene-controlled areas after confirming cleaning method, material requirements, and zone-control rules."
      details:
        - "Closed or smooth decks can reduce dirt traps, but cleaning effectiveness still depends on wash procedure, inspection access, drainage, and pallet condition during reuse."
        - "Confirm whether the site needs virgin material, color segregation, RFID or label zones, anti-slip features, or dedicated pallets for allergen, cleanroom, or cold-room areas."
        - "Food or pharmaceutical suitability should be confirmed against the buyer's internal standards and current supplier documents; do not assume certification from color or surface style alone."
      form: "Share hygiene zone, cleaning method, temperature, load weight, color or traceability needs, and any document requirements."
    "Egg Tray Transport Pallet Systems":
      hero: "An egg tray pallet system should be reviewed as a complete stack: base pallet, interlayers, tray pattern, stack height, ventilation, and handling route all affect stability."
      card: "Review the full egg tray stack, not only the base pallet, before confirming the system."
      details:
        - "Confirm tray footprint, layer count, divider sheet use, total stack height, and whether the load is moved by forklift, pallet jack, or hand transfer."
        - "Ventilation, shock exposure, short-haul transport, and cold-room handling can change the acceptable stacking pattern and restraint method."
        - "Sample testing with real trays is recommended before bulk use because tray stiffness, egg count, and road vibration can change stack stability."
      form: "Share tray size, layers per pallet, egg count, transport distance, handling equipment, and temperature conditions."
    "Foldable Pallet Boxes":
      hero: "Foldable pallet boxes are usually selected for closed-loop logistics where empty-return volume, side-wall strength, stacking behavior, and forklift access must work together."
      card: "Review for reusable bulk handling when folded height, stack load, and return logistics drive the specification."
      details:
        - "Confirm internal dimensions, fill weight, goods shape, side-wall load, and whether the container must stack full, stack empty, or return folded."
        - "Latch design, hinge condition, base stiffness, drainage, label areas, and fork entry should be checked because they affect daily handling more than capacity alone."
        - "If a racking load is listed, treat it as a reference condition and confirm beam span, support points, duration, and temperature before rack use."
      form: "Share goods, fill weight, internal volume target, fold-return route, stacking height, rack requirement, and handling equipment."
    "Rigid Bulk Containers":
      hero: "Rigid bulk containers are selected when side-wall strength, internal volume, stacking stability, and forklift handling are more important than folded return volume."
      card: "Review for bulk goods or packaged parts where a fixed-wall container supports storage and repeated handling."
      details:
        - "Rigid walls can protect goods and simplify loading, but they require more return and storage space than foldable containers."
        - "Confirm fill weight, impact risk, stacking height, liquid or loose-material behavior, drainage, cleaning method, and whether a lid or liner is required."
        - "For rack, conveyor, or cold-room use, confirm support method, temperature exposure, and dimensional tolerance against the current product data."
      form: "Share goods, fill weight, volume target, stacking height, cleaning method, and transport route."
    "Turnover Crates":
      hero: "Turnover crates are selected by ventilation, manual handling, nesting or stacking behavior, cleaning needs, and the protection required for the goods."
      card: "Use for produce, parts, or in-plant circulation after confirming stack, nest, and cleaning requirements."
      details:
        - "Ventilated crates support airflow and drainage for produce or wet handling, while solid crates provide more containment for small parts or ingredients."
        - "Check handle comfort, rim strength, stack stability, nesting ratio, label area, and whether workers handle the crate manually for long periods."
        - "For food, cold-chain, or washing use, confirm material, cleaning chemicals, drainage time, and temperature exposure."
      form: "Share goods, fill weight, crate size, stacking or nesting needs, washing method, and temperature."
    "Turnover Boxes":
      hero: "Turnover boxes and utility tanks should be selected by volume, wall stiffness, cleaning access, drainage, manual handling, and whether the goods are solid, wet, or liquid."
      card: "Review volume, wall stiffness, cleaning method, and handling route before choosing a box or tank."
      details:
        - "Open boxes support fast loading and sorting, while deeper tanks suit soaking, holding, mixing, or wet handling when wall and base support are sufficient."
        - "Confirm whether the contents are food ingredients, small parts, liquids, wet goods, or chemical-contact materials because material and cleaning needs differ."
        - "Check empty nesting, stackability, drainage, trolley or pallet compatibility, and the weight workers are expected to handle."
      form: "Share contents, volume, fill weight, cleaning method, stacking or nesting needs, and handling equipment."
    "Foldable Crates":
      hero: "Foldable crates are used where reusable distribution needs both loaded protection and compact empty return, but hinge and latch behavior should be checked in the real route."
      card: "Review for returnable distribution when folded height, latch durability, and manual handling matter."
      details:
        - "Confirm folded height, open-stack stability, latch design, hinge wear points, and whether workers can open and close the crate quickly without damaging goods."
        - "Use route testing when crates circulate through retail, produce, food service, or parts handling because repeated folding changes the maintenance requirement."
        - "Cleaning method, label area, color coding, and temperature exposure should be checked before standardizing the crate."
      form: "Share goods, route, fill weight, return frequency, cleaning method, and folded-storage target."
    "Freezing Trays":
      hero: "Freezing and drying trays are selected by airflow, drainage, product contact, stack height, washing method, and low-temperature handling conditions."
      card: "Review for freezing, drying, or washing lines where airflow, drainage, and product contact matter."
      details:
        - "Ventilated tray designs support chilling, freezing, drying, or draining, but tray spacing and stack height must match the process and product shape."
        - "Confirm food-contact requirements, cleaning chemicals, low-temperature impact risk, drainage time, and whether trays are moved manually or on carts."
        - "Before bulk use, test real product loading, freezing or drying time, and cleaning turnaround because small process changes can affect throughput."
      form: "Share product type, tray size, fill depth, temperature, washing method, stack height, and line layout."
    "Small Waste Bins":
      hero: "Small waste bins are usually selected for indoor sorting points, offices, workshops, and facility areas where capacity, lid type, color coding, and cleaning access matter."
      card: "Review for indoor or low-volume sorting after confirming capacity, lid, color, and cleaning route."
      details:
        - "Confirm the waste stream, daily volume, indoor or outdoor position, lid requirement, and whether the bin must fit under counters or into sorting stations."
        - "For project purchasing, check color coding, label areas, packing quantity, and replacement needs across the facility."
        - "If bins are moved frequently, review handle design, wall stiffness, cleaning method, and expected impact."
      form: "Share capacity, waste stream, color, lid style, quantity, and use location."
    "Two-Wheel Waste Bins":
      hero: "Two-wheel waste bins are selected for facility and collection routes where capacity, axle strength, wheel size, lid fit, and handling surface affect daily use."
      card: "Review for wheeled collection after confirming capacity, wheel conditions, and collection equipment."
      details:
        - "Confirm collection frequency, floor or road surface, loading weight, outdoor exposure, and whether workers move the bin over ramps or uneven ground."
        - "Wheel, axle, handle, and lid details should match the collection route because these parts see the highest handling stress."
        - "For municipal or industrial programs, confirm color coding, labeling, spare parts, packing quantity, and compatibility with lifting equipment if used."
      form: "Share capacity, waste stream, route surface, collection frequency, color, quantity, and any lifting equipment."
    "Four-Wheel Waste Bins":
      hero: "Four-wheel waste bins are usually specified for higher-volume collection points where maneuverability, brake or wheel layout, lid design, and loading route need confirmation."
      card: "Review for high-volume collection points after confirming route surface, loading weight, and wheel layout."
      details:
        - "Confirm whether the bin will be moved by hand, tug, vehicle, or lifting equipment because wheel and handle requirements change with the route."
        - "Large bins should be checked against loaded weight, turning space, lid clearance, outdoor exposure, and collection frequency."
        - "For project orders, confirm color, labeling, spare parts, packing, and local collection equipment compatibility before production."
      form: "Share capacity, loaded weight, route surface, handling method, lid type, color, and quantity."
    "Stackable Plastic Pallets":
      hero: "Stackable plastic pallets are available with several base structures. Confirm the floor-stacking, forklift, racking, and empty-storage requirements before choosing one."
      card: "Compare stackable structures by base type, load distribution, forklift fit, and storage method."
      details:
        - "Perimeter-base and double-faced structures can both support stacking, but they behave differently with pallet jacks, forklifts, conveyors, and empty storage."
        - "Confirm whether the operation needs floor stacking only, selective racking, block stacking, closed-loop reuse, or export transfer."
        - "Do not compare load ratings across structures without checking support method, load distribution, temperature, and storage duration."
      form: "Share load profile, storage method, handling equipment, stack height, rack needs, and destination."
    "Specialty Plastic Pallets":
      hero: "Specialty pallets solve a defined requirement such as hygiene, printing-line fit, spill containment, egg-tray stacking, or traceability."
      card: "Choose a specialty pallet only after confirming the application, operating risk, and required documents."
      details:
        - "Define the requirement the pallet must meet, such as cleanability, flatness, containment, tray stability, color coding, or equipment fit."
        - "Special designs should not be treated as general-purpose pallets unless load, handling, and storage conditions also match the model."
        - "Confirm any required documents, sample tests, color or logo needs, packing plan, and application limits before purchase."
      form: "Share the goods, load, equipment, operating risk, and required documents."
zh:
  load_note: "静载、动载和货架载应视为参考工况下的参数，不能直接互相替代。最终选型需结合货物分布、支撑方式、货架梁距、温度、存放时间、搬运频次和安全余量确认。"
  no_racking_note: "本页面未发布该型号的货架载参数。在未按具体梁距、支撑方式和载荷确认前，应按地面堆码、转运、出口或防渗漏等非上架用途评估。"
  families:
    "Plastic Pallets":
      hero: "塑料托盘应按结构、支撑方式、载荷类型、搬运设备、卫生要求和存储环境选型，而不是只看名义承重。"
      card: "重点确认结构、进叉方式、载荷工况、货架或地面使用方式以及材料。"
      details:
        - "先确认搬运方式：手动液压车、叉车、输送线、地面堆码、横梁货架、出口运输或闭环周转，对托盘底部结构的要求不同。"
        - "确认面板开孔或封闭、底部支撑点、货物是否均布、是否有集中受力点，以及是否存在超出托盘边缘的情况。"
        - "用于卫生、冷库、化工或自动化场景时，应进一步确认清洗方式、温度、冲击风险和尺寸公差。"
      form: "请提供货物、单托重量、码放方式、如有货架请提供梁距、搬运设备、温度、数量和目的地，便于核对适用性。"
    "Pallet Boxes & Bulk Containers":
      hero: "卡板箱和大型容器应围绕内尺寸、折叠需求、堆码方式、叉车进叉、返空物流和货物形态来选型。"
      card: "确认容积、底部结构、堆码高度、返空比例和装卸方式。"
      details:
        - "先确认容器承载的是散件、农产品、包装货、液体还是异形件，因为侧壁强度和底部支撑要求不同。"
        - "折叠款需要关注折叠高度、锁扣状态、堆码表现和返空路线，判断节省空间是否能覆盖使用复杂度。"
        - "若进入货架、输送线、冷库或清洗区，应确认支撑跨度、温度、排水、清洗方式和搬运频次。"
      form: "请提供货物类型、装载重量、堆码高度、返空路线、装卸设备和目的地。"
    "Plastic Crates & Boxes":
      hero: "周转筐、周转箱、托盘和方槽应匹配通风、排水、套叠或堆码、人工搬运、清洗和货物保护需求。"
      card: "适用于需要通风、排水、人工搬运或循环周转的场景。"
      details:
        - "网格筐有利于通风和排水；封闭箱体或方槽更适合小件、液体、食材或需要更好保护的物料。"
        - "确认需要套叠、错位堆叠、折叠还是满载堆码，因为不同结构会改变仓储密度和搬运方式。"
        - "用于食品、冷链、清洗或晾晒时，应确认材质要求、清洗流程、排水时间、温度和接触面要求。"
      form: "请提供货物、尺寸、装载重量、堆码或套叠需求、清洗方式和使用温度。"
    "Plastic Waste Bins":
      hero: "塑料垃圾桶应按容量、轮组、桶盖、户外暴露、收运频次和现场收集方式选型。"
      card: "确认容量、轮组、桶盖、收运频次和户外使用条件。"
      details:
        - "小容量垃圾桶通常用于室内、办公、工厂或低容量分类点；大容量带轮垃圾桶更适合收集路线和户外暂存。"
        - "应根据地面、搬运距离、冲击风险和收运频次确认轮径、轴承、把手、桶盖和桶壁强度。"
        - "市政或项目采购还需确认颜色分类、标签、装柜数量、备件和当地收运设备兼容性。"
      form: "请提供容量、颜色、桶盖、轮组、数量、使用位置和收运方式。"
  series:
    "Rackable 3-Runner Pallets":
      hero: "川字型上架托盘适合从横梁货架、叉车搬运和仓库循环周转角度评估，重点是梁距、载荷分布和挠度控制。"
      card: "适合评估横梁货架、叉车周转和仓储循环使用，需确认梁距和支撑方式。"
      details:
        - "三条底梁常用于需要明确底部支撑的叉车和横梁货架场景，但实际能否上架取决于梁距、货物分布和存放时间。"
        - "网格面板有利于减重和排水；如存在长期上架、重型纸箱或较高挠度风险，应评估是否需要钢管加强。"
        - "还需确认进叉方向、是否使用液压车、输送线接触点、冷库环境，以及货架载是否基于均布载荷。"
      form: "请提供单托重量、码放方式、梁距、货架类型、存放时间、温度和搬运设备。"
    "Perimeter-Base Stackable Pallets":
      hero: "田字底或周边底托盘通常用于稳定地面堆码和反复叉车搬运，连续底部支撑比空托套叠更重要。"
      card: "适合地面堆码、叉车转运和循环周转，需确认底部稳定性和实际支撑方式。"
      details:
        - "周边底结构能在地面或下层托盘上形成较连续接触，适合纸箱、袋装货或工业包装件的地面堆码。"
        - "不能仅凭底部形状判断可上架；若页面未列出货架载，应在确认梁距、加强结构和挠度后再考虑货架使用。"
        - "需确认进叉方式、货物是否外伸、面板平整度、堆码高度、清洗要求以及是否进入输送或自动化转运点。"
      form: "请提供载荷重量、货物占地、堆码高度、叉车类型、存储方式以及是否需要上架。"
    "Double-Faced Heavy-Duty Pallets":
      hero: "双面托盘通常用于重型地面堆码、块状堆码和反复叉车周转，双面都需要承托货物。"
      card: "适合重型地面堆码或双面使用，但需确认载荷分布和设备匹配。"
      details:
        - "双面结构可正反面使用并承托堆码载荷，但通常不适合手动液压车，因为底部没有开放式进叉空间。"
        - "重载使用应结合集中载荷、叉车冲击、堆码高度、存放时间以及货物底部是否尖锐或不平整进行确认。"
        - "如需上架，应索取当前型号的梁距、加强方式和挠度限制数据，不应只依据静载或动载判断。"
      form: "请提供货物类型、底部接触面积、堆码高度、叉车类型、是否上架和使用温度。"
    "Nestable 9-Leg Pallets":
      hero: "九脚套叠托盘通常用于出口运输、空托返程节省空间和地面转运，不应默认用于货架。"
      card: "适合出口、一次性发运和空托套叠，不适用于未经确认的货架存储。"
      details:
        - "九脚底部可让空托盘套叠，降低仓储和返空体积，但通常不具备横梁货架所需的连续底部支撑。"
        - "更适合地面堆码、轻中载转运、出口装运或托盘由地面/整面平台支撑的配送路线。"
        - "需确认液压车或叉车兼容性、货物是否外伸、套叠高度、装柜数量，以及目的地是否会要求上架。"
      form: "请提供目的地、装柜目标、单托重量、货物尺寸、搬运设备以及一次性或循环使用方式。"
    "Nestable Blow-Molded Pallets":
      hero: "吹塑套叠托盘通常用于出口、地面搬运和冲击较多的转运路线，空托套叠和防潮性能是主要考虑点。"
